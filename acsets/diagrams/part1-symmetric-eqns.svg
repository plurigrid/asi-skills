<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <title>Symmetric Graph Equations</title>
  
  <!-- Background -->
  <rect width="500" height="300" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Symmetric Graph Schema Equations</text>
  
  <!-- Equation 1 -->
  <rect x="30" y="60" width="440" height="50" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="250" y="92" text-anchor="middle" font-family="serif" font-size="20" fill="#1E40AF">inv ∘ src = tgt</text>
  <text x="450" y="80" text-anchor="end" font-family="sans-serif" font-size="10" fill="#666">(1)</text>
  
  <!-- Equation 2 -->
  <rect x="30" y="125" width="440" height="50" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
  <text x="250" y="157" text-anchor="middle" font-family="serif" font-size="20" fill="#047857">inv ∘ tgt = src</text>
  <text x="450" y="145" text-anchor="end" font-family="sans-serif" font-size="10" fill="#666">(2)</text>
  
  <!-- Equation 3 -->
  <rect x="30" y="190" width="440" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="250" y="222" text-anchor="middle" font-family="serif" font-size="20" fill="#B45309">inv ∘ inv = id_E</text>
  <text x="450" y="210" text-anchor="end" font-family="sans-serif" font-size="10" fill="#666">(3)</text>
  
  <!-- Interpretation -->
  <text x="250" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">
    For every edge e: e.inv.src = e.tgt, e.inv.tgt = e.src, e.inv.inv = e
  </text>
  <text x="250" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">
    Involution swaps source and target, applying twice returns original edge
  </text>
</svg>
