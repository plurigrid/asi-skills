<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <title>Symmetric Graph Schema with Involution</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Objects -->
  <circle cx="100" cy="120" r="35" fill="#A855F7" stroke="#7C3AED" stroke-width="2"/>
  <text x="100" y="125" text-anchor="middle" fill="white" font-family="serif" font-size="22" font-weight="bold">E</text>
  
  <circle cx="300" cy="120" r="35" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <text x="300" y="125" text-anchor="middle" fill="white" font-family="serif" font-size="22" font-weight="bold">V</text>
  
  <!-- src morphism -->
  <path d="M140,100 Q200,60 260,100" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="55" text-anchor="middle" font-family="serif" font-size="14">src</text>
  
  <!-- tgt morphism -->
  <path d="M140,140 Q200,180 260,140" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="195" text-anchor="middle" font-family="serif" font-size="14">tgt</text>
  
  <!-- inv morphism (self-loop) -->
  <path d="M75,85 C30,50 30,190 75,155" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="25" y="120" text-anchor="middle" font-family="serif" font-size="14" fill="#EF4444">inv</text>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">Symmetric Graph Schema: inv : E → E (involution)</text>
  
  <!-- Legend -->
  <text x="200" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">inv ∘ inv = id_E</text>
</svg>
