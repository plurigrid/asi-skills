<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <title>Half-Edge Graph Schema</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Half-Edge Graph Schema: Sch(HGraph)</text>
  
  <!-- Objects -->
  <circle cx="100" cy="130" r="35" fill="#F97316" stroke="#C2410C" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" fill="white" font-family="serif" font-size="22" font-weight="bold">H</text>
  
  <circle cx="300" cy="130" r="35" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="white" font-family="serif" font-size="22" font-weight="bold">V</text>
  
  <!-- vertex morphism -->
  <path d="M140,130 L255,130" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="195" y="120" text-anchor="middle" font-family="serif" font-size="14">vertex</text>
  
  <!-- inv morphism (self-loop on H) -->
  <path d="M85,95 C50,40 150,40 115,95" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="100" y="55" text-anchor="middle" font-family="serif" font-size="14" fill="#EF4444">inv</text>
  
  <!-- Legend -->
  <text x="200" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">inv ∘ inv = id_H (involution)</text>
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Fixed points h·inv = h are dangling edges</text>
  <text x="200" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Paired half-edges form undirected edges</text>
</svg>
